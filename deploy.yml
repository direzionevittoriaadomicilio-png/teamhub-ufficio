name: Deploy TeamHub su GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepara file statici
        run: |
          mkdir -p dist
          cp index.html dist/
          cp manifest.json dist/ 2>/dev/null || true
          cp sw.js dist/ 2>/dev/null || true
          cp favicon.ico dist/ 2>/dev/null || true
          cp icon.svg dist/ 2>/dev/null || true
          cp icon-192.png dist/ 2>/dev/null || true
          cp icon-512.png dist/ 2>/dev/null || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
