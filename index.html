const HDR = { "Content-Type": "application/json", apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

async function dbGet(table, query = "") {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}${query}`, { headers: HDR });
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  } catch { return []; }
}
async function dbUpsert(table, data) {
  try {
    await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: { ...HDR, Prefer: "resolution=merge-duplicates" },
      body: JSON.stringify(data),
    });
  } catch { /* ignore */ }
}
async function dbDelete(table, filter) {
  try { await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method: "DELETE", headers: HDR }); }
  catch { /* ignore */ }
}
async function kvGet(key) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/kv_store?key=eq.${encodeURIComponent(key)}&select=value`, { headers: HDR });
    const d = await r.json();
    return Array.isArray(d) && d.length > 0 ? d[0].value : null;
  } catch { return null; }
}
async function kvSet(key, value) {
  await dbUpsert("kv_store", { key, value });
}

function ComunicazioneCard({ msg, cur, onLetto, onDelete, canSeeAll }) {
  const mittente  = getUser(msg.mittente);
  const dests     = Array.isArray(msg.destinatari) ? msg.destinatari : [];
  const destUsers = dests.map(id => getUser(id)).filter(Boolean);
  const letti_    = msg.letti && typeof msg.letti === "object" ? msg.letti : {};
  const isLetto   = !!letti_[cur.id];
  const isOwn     = msg.mittente === cur.id;
  const tuttiLetto= dests.every(id => letti_[id]);
  const isAssigned= dests.includes(cur.id);
  const bgColor   = (!isLetto && isAssigned) ? "#fffbeb" : "#fff";
  return (
    <div style={{ background:bgColor, border:"1px solid "+((isAssigned && !isLetto) ? "#fde68a" : C.border), borderRadius:12, padding:14, marginBottom:10, boxShadow:C.shadow }}>

          {mittente && <span style={{ background:mittente.bg, color:mittente.color, padding:"2px 10px", borderRadius:20, fontSize:12, fontWeight:700 }}>{mittente.name}</span>}
          <span style={{ color:C.muted, fontSize:11 }}>→</span>
          {destUsers.map(u => <span key={u.id} style={{ background:u.bg, color:u.color, padding:"2px 10px", borderRadius:20, fontSize:12, fontWeight:600 }}>{u.name}{letti_[u.id] ? " ✓" : ""}</span>)}
          {(!isAssigned && !isOwn && canSeeAll) && <span style={{ color:C.muted, fontSize:11, fontStyle:"italic" }}>— visibile come admin</span>}
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
          <span style={{ color:C.muted, fontSize:11 }}>{String(msg.created_at||"")}</span>
          {(isOwn || ADMINS.includes(cur.id)) && <button onClick={onDelete} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, lineHeight:1 }}>×</button>}
        </div>
      </div>
      <p style={{ color:C.text, fontSize:14, lineHeight:1.7, margin:"0 0 10px", whiteSpace:"pre-wrap" }}>{String(msg.testo||"")}</p>
      {(isAssigned && !isLetto) && <button onClick={onLetto} style={{ background:"#059669", color:"#fff", border:"none", borderRadius:8, padding:"6px 16px", cursor:"pointer", fontFamily:"inherit", fontWeight:700, fontSize:13 }}>✓ Segna come letto</button>}

      {(isOwn && !isAssigned) && <span style={{ color:tuttiLetto?"#059669":C.muted, fontSize:12, fontWeight:600 }}>{tuttiLetto ? "✓ Letto da tutti" : "⌛ In attesa di lettura..."}</span>}
    </div>
  );
}

function PageComunicazione({ cur }) {
  const color     = "#6366f1";
  const canSeeAll = ADMINS.includes(cur.id);
  const [msgs,  setMsgs]  = useState([]);
  const [testo, setTesto] = useState("");
  const [dests, setDests] = useState([]);
  const [load,  setLoad]  = useState(true);
  const [tab,   setTab]   = useState("ricevute");

  const load_ = async () => {
    setLoad(true);
    const d = await dbGet("comunicazioni", "?order=created_at.desc");
    setMsgs(d);
    setLoad(false);
  };
  useEffect(() => { load_(); }, []);

  const toggleDest = id => setDests(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);

  const invia = async () => {
    if (!testo.trim() || dests.length === 0) return;
    const ora = new Date().toLocaleString("it-IT", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
    await dbUpsert("comunicazioni", { id:Date.now(), testo:testo.trim(), mittente:cur.id, destinatari:dests, letti:{}, created_at:ora });
    setTesto(""); setDests([]);
    load_();
  };

  const segnaLetto = async msg => {
    const letti = { ...(msg.letti||{}), [cur.id]: true };
    await dbUpsert("comunicazioni", { ...msg, letti });
    setMsgs(p => p.map(m => m.id===msg.id ? { ...m, letti } : m));
  };

  const elimina = async id => {
    await dbDelete("comunicazioni", `id=eq.${id}`);
    setMsgs(p => p.filter(m => m.id!==id));
  };

  const ricevute = msgs.filter(m => (Array.isArray(m.destinatari)?m.destinatari:[]).includes(cur.id));
  const inviate  = msgs.filter(m => m.mittente === cur.id);
  const nonLette = ricevute.filter(m => !(m.letti||{})[cur.id]).length;
  const listDa   = tab==="ricevute" ? ricevute : tab==="inviate" ? inviate : msgs;

  const tabList = [
    {id:"ricevute", l:"📥 Ricevute"+(nonLette>0?" ("+nonLette+")":"")},
    {id:"inviate",  l:"📤 Inviate"},
  ];
  if (canSeeAll) tabList.push({id:"tutte", l:"👁 Tutte"});

  return (
    <div>
      <TBar tabs={tabList} active={tab} onSelect={setTab} color={color} />

      <Card style={{ marginBottom:20, borderLeft:"3px solid "+color }}>
        <STitle color={color}>Nuova comunicazione</STitle>
        <div style={{ marginBottom:12 }}>
          <label style={{ color:C.sec, fontSize:11, fontWeight:600, display:"block", marginBottom:8 }}>Invia a</label>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {USERS.filter(u => u.id !== cur.id).map(u => {
              const sel = dests.includes(u.id);
              return (
                <button key={u.id} onClick={() => toggleDest(u.id)}
                  style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 14px", borderRadius:8, cursor:"pointer", fontFamily:"inherit",
                    border:"2px solid "+(sel?u.color:C.border), background:sel?u.bg:"#fff" }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:u.color }} />
                  <span style={{ color:sel?u.color:C.sec, fontWeight:600, fontSize:13 }}>{u.name}</span>
                  {sel && <span style={{ color:u.color }}>✓</span>}
                </button>
              );
            })}
          </div>
          {dests.length === 0 && <p style={{ color:"#dc2626", fontSize:11, margin:"6px 0 0" }}>Seleziona almeno un destinatario.</p>}
        </div>
        <div style={{ marginBottom:12 }}>
          <label style={{ color:C.sec, fontSize:11, fontWeight:600, display:"block", marginBottom:4 }}>Messaggio</label>
          <textarea value={testo} onChange={e=>setTesto(e.target.value)} placeholder="Scrivi il tuo messaggio..." rows={3}
            style={{ background:C.input, border:"1px solid "+C.border, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:14, fontFamily:"inherit", outline:"none", width:"100%", boxSizing:"border-box", resize:"vertical", lineHeight:1.6 }} />
        </div>
        <Btn onClick={invia} color={color}>📤 Invia</Btn>
      </Card>

      {load ? <Spin /> : listDa.length === 0 ? (
        <Card><p style={{ color:C.muted, fontSize:13, margin:0 }}>
          {tab==="ricevute" ? "Nessuna comunicazione ricevuta." : tab==="inviate" ? "Nessuna comunicazione inviata." : "Nessuna comunicazione."}
        </p></Card>
      ) : listDa.map(msg => (
        <ComunicazioneCard key={msg.id} msg={msg} cur={cur}
          onLetto={() => segnaLetto(msg)}
          onDelete={() => elimina(msg.id)}
          canSeeAll={canSeeAll}
        />
      ))}
    </div>
  );
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const toDay   = () => new Date().toISOString().split("T")[0];
const p2      = n  => String(n).padStart(2, "0");
const dayOf   = (o=0) => { const d=new Date(); d.setDate(d.getDate()+o); return d.toISOString().split("T")[0]; };
const weekOf  = (o=0) => { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)+o*7); return d.toISOString().split("T")[0]; };
const monthOf = (o=0) => { const d=new Date(); d.setMonth(d.getMonth()+o); return `${d.getFullYear()}-${p2(d.getMonth()+1)}`; };
const getUser = id  => USERS.find(u => u.id === id);
const fmtDay  = k  => { const [y,m,d]=k.split("-"); return `${parseInt(d,10)} ${MESI[parseInt(m,10)-1]} ${y}`; };
const fmtMon  = k  => { const [y,m]=k.split("-"); return `${MESI[parseInt(m,10)-1]} ${y}`; };
const calcL   = (i,p) => { const iv=parseFloat(i),pv=parseFloat(p); return iv&&pv ? (iv/pv).toFixed(3) : ""; };
const grpBy   = (arr,fn) => arr.reduce((a,x) => { const k=fn(x); (a[k]=a[k]||[]).push(x); return a; }, {});
const wkDates = o  => { const b=new Date(weekOf(o)); return Array(7).fill(0).map((_,i) => { const d=new Date(b); d.setDate(b.getDate()+i); return d; }); };
const mesiTabs= (arr,vf) => {
  const src = vf ? arr.filter(e=>e.veicolo===vf) : arr;
  const ks  = [...new Set(src.map(e=>(e.data||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const cur = monthOf(0);
  if (!ks.includes(cur)) ks.unshift(cur);
  return ks.map(m => ({ id:m, l:`${MESI_S[parseInt(m.split("-")[1],10)-1]} ${m.split("-")[0]}` }));
};
const getFesta = (year, mmdd) => {
  const fixed = FESTIVITA[mmdd] || null;
  if (fixed) return fixed;
  // Festa della Mamma: 2a domenica maggio
  const d1=new Date(year,4,1), dom1=(7-d1.getDay())%7, mDay=1+dom1+7;
  if (mmdd === `05-${p2(mDay)}`) return "💐 Festa Mamma";
  // Black Friday: 4o venerdì novembre
  const n1=new Date(year,10,1), ven1=(5-n1.getDay()+7)%7, bf=1+ven1+21;
  if (bf<=30 && mmdd === `11-${p2(bf)}`) return "🛍️ Black Friday";
  return null;
};

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrBound extends Component {
  state = { err: null };
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) {
      return (
        <div style={{padding:20,background:"#fee2e2",borderRadius:8,margin:8,border:"1px solid #fca5a5"}}>
          <strong style={{color:"#dc2626"}}>Errore in {this.props.name}</strong>
          <p style={{color:"#7f1d1d",fontSize:13,marginTop:4}}>{String(this.state.err.message || this.state.err)}</p>
        </div>
      );
    }
    return this.props.children;
  }
}

function Sel({ label, value, onChange, opts }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      {label && <label style={{ color:C.sec, fontSize:11, fontWeight:600 }}>{label}</label>}
      <select
        value={value} onChange={onChange}
        style={{
          background:C.input, border:`1px solid ${C.border}`, borderRadius:8,
          color:C.text, padding:"8px 12px", fontSize:13, fontFamily:"inherit", outline:"none",
        }}
      >
        {opts.map(o => (
          <option key={typeof o === "object" ? o.v : o} value={typeof o === "object" ? o.v : o}>
            {typeof o === "object" ? o.l : o}
          </option>
        ))}
      </select>
    </div>
  );
}

function Progress({ pct, color="#6366f1" }) {
  return (
    <div style={{ background:"#e2e8f0", borderRadius:4, height:5, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, height:"100%", background:color, transition:"width .3s", borderRadius:4 }} />
    </div>
  );
}

function Spin() {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", padding:32 }}>
      <div style={{
        width:28, height:28,
        border:"3px solid #e2e8f0", borderTop:`3px solid #6366f1`,
        borderRadius:"50%", animation:"spin .8s linear infinite",
      }} />
    </div>
  );
}

function PNav({ label, onPrev, onNext, atEnd=false, onReset, resetLabel="Oggi" }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, flexWrap:"wrap" }}>
      <button onClick={onPrev} style={{ background:C.hover, border:`1px solid ${C.border}`, color:C.text, borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:15 }}>‹</button>
      <span style={{ color:C.text, fontWeight:600, fontSize:13, minWidth:160, textAlign:"center" }}>{label}</span>
      <button onClick={onNext} style={{ background:C.hover, border:`1px solid ${C.border}`, color:C.text, borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:15 }}>›</button>
      {!atEnd && <button onClick={onReset} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:12, fontFamily:"inherit", textDecoration:"underline" }}>{resetLabel} ↩</button>}
    </div>
  );
}

function MBar({ tabs, active, onSelect, color }) {
  return (
    <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
      {tabs.map(t => (
        <button
          key={t.id} onClick={() => onSelect(t.id)}
          style={{
            padding:"5px 12px", borderRadius:20, cursor:"pointer", fontFamily:"inherit",
            border:`1px solid ${active===t.id ? color : C.border}`,
            background: active===t.id ? `${color}14` : "#fff",
            color: active===t.id ? color : C.sec,
            fontWeight:600, fontSize:12,
          }}
        >{t.l}</button>
      ))}
    </div>
  );
}

function TBar({ tabs, active, onSelect, color }) {
  return (
    <div style={{ display:"flex", gap:0, marginBottom:20, borderBottom:`1px solid ${C.border}` }}>
      {tabs.map(t => (
        <button
          key={t.id} onClick={() => onSelect(t.id)}
          style={{
            padding:"10px 16px", border:"none", fontFamily:"inherit",
            borderBottom:`2px solid ${active===t.id ? color : "transparent"}`,
            background:"transparent", color: active===t.id ? color : C.sec,
            cursor:"pointer", fontWeight: active===t.id ? 700 : 500, fontSize:13,
            marginBottom:-1,
          }}
        >{t.l}</button>
      ))}
    </div>
  );
}

function ClRow({ item, checked, onToggle, canEdit, color }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
      <Chk on={checked} onChange={onToggle} color={color} off={!canEdit} />
      <span style={{ color: checked ? C.muted : C.text, textDecoration: checked ? "line-through" : "none", fontSize:14 }}>
        {item.t}
      </span>
    </div>
  );
}

// ─── PAGE: HOME ───────────────────────────────────────────────────────────────
function PageHome({ cur }) {
  const [daily,  setDaily]  = useState(0);
  const [weekly, setWeekly] = useState(0);
  const [carnet, setCarnet] = useState(0);
  const [tasks,  setTasks]  = useState(0);

  useEffect(() => {
    const td = toDay(), wk = weekOf(0);
    Promise.all([
      kvGet(`daily-${td}`),
      kvGet(`weekly-${wk}`),
      dbGet("carnet", "?pagato=eq.no&select=valore"),
      dbGet("tasks",  "?select=assegnati,done"),
    ]).then(([d, w, cn, tk]) => {
      const obj_d = d && typeof d === "object" && !Array.isArray(d) ? d : {};
      const obj_w = w && typeof w === "object" && !Array.isArray(w) ? w : {};
      setDaily(CL_GG.filter(i => obj_d[i.id]).length);
      setWeekly(CL_SETT.filter(i => obj_w[i.id]).length);
      const pend = Array.isArray(cn) ? cn.reduce((s, c) => s + parseFloat(c.valore || 0), 0) : 0;
      setCarnet(Math.round(pend));
      const myT = Array.isArray(tk) ? tk.filter(t => {
        const ass = Array.isArray(t.assegnati) ? t.assegnati : [];
        const dn  = t.done && typeof t.done === "object" ? t.done : {};
        return ass.includes(cur.id) && !dn[cur.id];
      }).length : 0;
      setTasks(myT);
    });
  }, [cur.id]);

  const kpis = [
    { l:"Checklist oggi",      v:`${daily}/${CL_GG.length}`,    color:"#2563eb", pct: daily/CL_GG.length*100 },
    { l:"Checklist settimana", v:`${weekly}/${CL_SETT.length}`, color:"#7c3aed", pct: weekly/CL_SETT.length*100 },
    { l:"Carnet da incassare", v:`€${carnet}`,                  color:"#dc2626", pct: null },
    { l:"Task da fare",        v:`${tasks}`,                    color:"#ea580c", pct: null },
  ];

  return (
    <div>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ color:C.text, margin:"0 0 4px", fontSize:22, fontWeight:800, fontFamily:"'Syne',sans-serif" }}>
          Buongiorno, <span style={{ color:cur.color }}>{cur.full}</span> 👋
        </h2>
        <p style={{ color:C.muted, margin:0, fontSize:13 }}>
          {new Date().toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}
        </p>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:14 }}>
        {kpis.map((k,i) => (
          <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"18px 16px", boxShadow:C.shadow, borderTop:`3px solid ${k.color}` }}>
            <div style={{ color:C.muted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10 }}>{k.l}</div>
            <div style={{ color:k.color, fontSize:28, fontWeight:800, marginBottom: k.pct !== null ? 10 : 0 }}>{k.v}</div>
            {k.pct !== null && <Progress pct={k.pct} color={k.color} />}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CHECKLIST COMPONENT ──────────────────────────────────────────────────────
function Checklist({ canEdit, color }) {
  const [dOff, setDOff] = useState(0);
  const [wOff, setWOff] = useState(0);
  const [mOff, setMOff] = useState(0);
  const [daily,   setDC]   = useState({});
  const [weekly,  setWC]   = useState({});
  const [monthly, setMC]   = useState({});
  const [coop, setCoop]    = useState("");

  const dk = dayOf(dOff), wk = weekOf(wOff), mk = monthOf(mOff);

  useEffect(() => { kvGet(`daily-${dk}`).then(v => { setDC(v && typeof v === "object" && !Array.isArray(v) ? v : {}); }); }, [dk]);
  useEffect(() => { kvGet(`weekly-${wk}`).then(v => { setWC(v && typeof v === "object" && !Array.isArray(v) ? v : {}); kvGet("coop_date").then(c => setCoop(typeof c === "string" ? c : "")); }); }, [wk]);
  useEffect(() => { kvGet(`monthly-${mk}`).then(v => { setMC(v && typeof v === "object" && !Array.isArray(v) ? v : {}); }); }, [mk]);

  const togD = async id => { if (!canEdit) return; const n={...daily,[id]:!daily[id]}; setDC(n); await kvSet(`daily-${dk}`, n); };
  const togW = async id => { if (!canEdit) return; const n={...weekly,[id]:!weekly[id]}; setWC(n); await kvSet(`weekly-${wk}`, n); };
  const togM = async id => { if (!canEdit) return; const n={...monthly,[id]:!monthly[id]}; setMC(n); await kvSet(`monthly-${mk}`, n); };

  return (
    <div style={{ display:"grid", gap:16 }}>
      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni giorno</STitle>
          <Bdg txt={`${CL_GG.filter(i=>daily[i.id]).length}/${CL_GG.length}`} color={color} />
        </div>
        <PNav label={dOff===0 ? `Oggi — ${dk}` : fmtDay(dk)} onPrev={()=>setDOff(o=>o-1)} onNext={()=>setDOff(o=>Math.min(0,o+1))} atEnd={dOff===0} onReset={()=>setDOff(0)} resetLabel="Oggi" />
        {CL_GG.map(item => (
          <ClRow key={item.id} item={item} checked={!!daily[item.id]} onToggle={()=>togD(item.id)} canEdit={canEdit} color={color} />
        ))}
      </Card>

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni settimana</STitle>
          <Bdg txt={`${CL_SETT.filter(i=>weekly[i.id]).length}/${CL_SETT.length}`} color={color} />
        </div>
        <PNav label={wOff===0 ? "Questa settimana" : `Sett. ${wk}`} onPrev={()=>setWOff(o=>o-1)} onNext={()=>setWOff(o=>Math.min(0,o+1))} atEnd={wOff===0} onReset={()=>setWOff(0)} resetLabel="Questa" />
        {CL_SETT.map(item => (
          <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.border}`, flexWrap:"wrap" }}>
            <Chk on={!!weekly[item.id]} onChange={()=>togW(item.id)} color={color} off={!canEdit} />
            <span style={{ color:weekly[item.id]?C.muted:C.text, textDecoration:weekly[item.id]?"line-through":"none", fontSize:14, flex:1 }}>{item.t}</span>
            {item.data && (
              <input type="date" value={coop} disabled={!canEdit} onChange={e => { setCoop(e.target.value); kvSet("coop_date", e.target.value); }}
                style={{ background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 10px", fontSize:12 }} />
            )}
          </div>
        ))}
      </Card>

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni mese</STitle>
          <Bdg txt={`${CL_MESE.filter(i=>monthly[i.id]).length}/${CL_MESE.length}`} color={color} />
        </div>
        <PNav label={mOff===0 ? `Questo mese — ${fmtMon(mk)}` : fmtMon(mk)} onPrev={()=>setMOff(o=>o-1)} onNext={()=>setMOff(o=>Math.min(0,o+1))} atEnd={mOff===0} onReset={()=>setMOff(0)} resetLabel="Questo" />
        {CL_MESE.map(item => (
          <ClRow key={item.id} item={item} checked={!!monthly[item.id]} onToggle={()=>togM(item.id)} canEdit={canEdit} color={color} />
        ))}
      </Card>
    </div>
  );
}

// ─── CARBURANTE ───────────────────────────────────────────────────────────────
function Carburante({ canEdit }) {
  const [veic, setVeic] = useState("ford");
  const [selM, setSelM] = useState(monthOf(0));
  const [form, setForm] = useState({ data:toDay(), km:"", importo:"", prezzo:"", litri:"", pag:"Carta", fatt:"", note:"" });
  const [show, setShow] = useState(false);
  const [rows, setRows] = useState([]);
  const [load, setLoad] = useState(true);
  const v = VEICOLI.find(x => x.id === veic) || VEICOLI[0];

  const fetch_ = useCallback(async () => {
    setLoad(true);
    const d = await dbGet("fuel", `?veicolo=eq.${veic}&order=data.desc`);
    setRows(d);
    setLoad(false);
  }, [veic]);

  useEffect(() => { fetch_(); }, [fetch_]);

  const upd = (k, val) => setForm(p => {
    const n = { ...p, [k]: val };
    if (k === "importo" || k === "prezzo") n.litri = calcL(k==="importo"?val:p.importo, k==="prezzo"?val:p.prezzo);
    return n;
  });

  const save = async () => {
    if (!form.km || !form.importo) return;
    await dbUpsert("fuel", { id:Date.now(), data:form.data, km:form.km, importo:form.importo, prezzo:form.prezzo, litri:form.litri, pagamento:form.pag, fattorino:form.fatt, note:form.note, veicolo:veic });
    setForm({ data:toDay(), km:"", importo:"", prezzo:"", litri:"", pag:"Carta", fatt:"", note:"" });
    setShow(false);
    fetch_();
  };

  const vis = rows.filter(e => (e.data||"").startsWith(selM));
  const totE = vis.reduce((s,e) => s+parseFloat(e.importo||0), 0).toFixed(2);
  const totL = vis.reduce((s,e) => s+parseFloat(e.litri||0), 0).toFixed(2);

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {VEICOLI.map(vv => (
          <button key={vv.id} onClick={() => { setVeic(vv.id); setShow(false); }}
            style={{ padding:"7px 16px", borderRadius:20, fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit",
              border:`1px solid ${veic===vv.id ? vv.color : C.border}`,
              background: veic===vv.id ? `${vv.color}14` : "#fff",
              color: veic===vv.id ? vv.color : C.sec }}>
            {vv.nome}
          </button>
        ))}
      </div>
      <MBar tabs={mesiTabs(rows, veic)} active={selM} onSelect={setSelM} color={v.color} />

      {canEdit && !show && <div style={{ marginBottom:16 }}><Btn onClick={() => setShow(true)} color={v.color}>+ Nuovo rifornimento</Btn></div>}
      {canEdit && show && (
        <Card style={{ marginBottom:16 }}>
          <STitle>Nuovo rifornimento — {v.nome}</STitle>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <Inp label="Data" type="date" value={form.data} onChange={e=>upd("data",e.target.value)} />
            <Inp label="KM attuali" type="number" value={form.km} onChange={e=>upd("km",e.target.value)} placeholder="es. 14500" />
            <Inp label="Importo €" type="number" value={form.importo} onChange={e=>upd("importo",e.target.value)} placeholder="es. 65.00" />
            <Inp label="Prezzo €/L" type="number" value={form.prezzo} onChange={e=>upd("prezzo",e.target.value)} placeholder="es. 1.65" />
            <Inp label="Litri (auto)" value={form.litri} ro placeholder="calcolato" />
            <Sel label="Pagamento" value={form.pag} onChange={e=>upd("pag",e.target.value)} opts={PAGAMENTI} />
          </div>
          {v.fatt && <div style={{ marginBottom:12 }}><Inp label="Nome fattorino" value={form.fatt} onChange={e=>upd("fatt",e.target.value)} placeholder="Nome del fattorino" /></div>}
          <div style={{ marginBottom:14 }}><Inp label="Note" value={form.note} onChange={e=>upd("note",e.target.value)} /></div>
          <div style={{ display:"flex", gap:8 }}><Btn onClick={save} color={v.color}>Salva</Btn><Btn onClick={() => setShow(false)} ghost>Annulla</Btn></div>
        </Card>
      )}

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14, flexWrap:"wrap", gap:10 }}>
          <STitle>{v.nome} — {fmtMon(selM)}</STitle>
          {vis.length > 0 && (
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ background:`${v.color}10`, border:`1px solid ${v.color}30`, borderRadius:8, padding:"6px 12px", textAlign:"center" }}>
                <div style={{ color:v.color, fontSize:15, fontWeight:800 }}>€{totE}</div>
                <div style={{ color:C.muted, fontSize:10 }}>spesa</div>
              </div>
              <div style={{ background:"#7c3aed10", border:"1px solid #7c3aed30", borderRadius:8, padding:"6px 12px", textAlign:"center" }}>
                <div style={{ color:"#7c3aed", fontSize:15, fontWeight:800 }}>{totL} L</div>
                <div style={{ color:C.muted, fontSize:10 }}>litri</div>
              </div>
            </div>
          )}
        </div>
        {load ? <Spin /> : vis.length === 0 ? <p style={{ color:C.muted, fontSize:13 }}>Nessun rifornimento per questo mese.</p> : (
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead>
                <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                  {["Data","KM","Importo","€/L","Litri","Pag.", ...(v.fatt?["Fattorino"]:[]), "Note"].map(h => (
                    <th key={h} style={{ color:C.sec, padding:"8px", textAlign:"left", fontWeight:700, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {vis.map(e => (
                  <tr key={e.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                    <td style={{ padding:"9px 8px", color:C.text, fontSize:13 }}>{String(e.data||"")}</td>
                    <td style={{ padding:"9px 8px", color:C.text, fontSize:13, fontWeight:600 }}>{String(e.km||"")} km</td>
                    <td style={{ padding:"9px 8px", color:"#059669", fontSize:13, fontWeight:700 }}>€{String(e.importo||"")}</td>
                    <td style={{ padding:"9px 8px", color:C.sec, fontSize:13 }}>€{String(e.prezzo||"")}</td>
                    <td style={{ padding:"9px 8px", color:"#7c3aed", fontSize:13, fontWeight:600 }}>{String(e.litri||"")} L</td>
                    <td style={{ padding:"9px 8px" }}><Bdg txt={String(e.pagamento||"")} color={v.color} /></td>
                    {v.fatt && <td style={{ padding:"9px 8px", color:"#d97706", fontSize:13, fontWeight:600 }}>{String(e.fattorino||"")}</td>}
                    <td style={{ padding:"9px 8px", color:C.muted, fontSize:13 }}>{String(e.note||"")}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{ borderTop:`2px solid ${C.border}`, background:"#f8fafc" }}>
                  <td colSpan={2} style={{ padding:"8px", color:C.sec, fontWeight:700, fontSize:12 }}>TOTALE</td>
                  <td style={{ padding:"8px", color:"#059669", fontWeight:800 }}>€{totE}</td>
                  <td /><td style={{ padding:"8px", color:"#7c3aed", fontWeight:800 }}>{totL} L</td>
                  <td colSpan={v.fatt ? 3 : 2} />
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// ─── CARNET ───────────────────────────────────────────────────────────────────
function Carnet({ canEdit }) {
  const color = "#2563eb";
  const [selM,   setSelM]   = useState(monthOf(0));
  const [rows,   setRows]   = useState([]);
  const [azList, setAzList] = useState([]);
  const [load,   setLoad]   = useState(true);
  const [show,   setShow]   = useState(false);
  const [showNA, setShowNA] = useState(false);
  const [newAz,  setNewAz]  = useState("");
  const [form,   setForm]   = useState({ data:toDay(), azienda:"", nCarnet:"1", valore:"50", pagato:"no", fattura:"no", note:"", data_pag:"" });

  const fetch_ = useCallback(async () => {
    setLoad(true);
    const [c, a] = await Promise.all([dbGet("carnet","?order=data.desc"), dbGet("aziende","?order=name.asc")]);
    setRows(c);
    const azNames = a.map(x => String(x.name || "")).filter(Boolean);
    setAzList(azNames);
    if (!form.azienda && azNames.length) setForm(p => ({ ...p, azienda: azNames[0] }));
    setLoad(false);
  }, []); // eslint-disable-line

  useEffect(() => { fetch_(); }, [fetch_]);

  const save = async () => {
    if (!form.azienda) return;
    await dbUpsert("carnet", { id:Date.now(), data:form.data, azienda:form.azienda, n_carnet:form.nCarnet, valore:form.valore, pagato:form.pagato, fattura:form.fattura, note:form.note, data_pag:form.data_pag });
    setForm(p => ({ ...p, nCarnet:"1", valore:"50", pagato:"no", fattura:"no", note:"", data_pag:"", data:toDay() }));
    setShow(false);
    fetch_();
  };

  const addAz = async () => {
    const n = newAz.trim().toUpperCase();
    if (!n) return;
    await dbUpsert("aziende", { name: n });
    setNewAz(""); setShowNA(false);
    setAzList(p => [...new Set([...p,n])].sort());
    setForm(p => ({ ...p, azienda: n }));
  };

  const vis = rows.filter(e => (e.data||"").startsWith(selM));
  const byDay = grpBy(vis, e => (e.data||"").slice(0,10));
  const days = Object.keys(byDay).sort().reverse();
  const totInc  = vis.filter(e=>e.pagato==="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);
  const totPend = vis.filter(e=>e.pagato!=="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);

  return (
    <div>
      <MBar tabs={mesiTabs(rows)} active={selM} onSelect={setSelM} color={color} />
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ background:"#d1fae5", border:"1px solid #6ee7b7", borderRadius:10, padding:"10px 18px" }}>
          <div style={{ color:"#059669", fontSize:20, fontWeight:800 }}>€{Math.round(totInc)}</div>
          <div style={{ color:C.sec, fontSize:11 }}>Incassato</div>
        </div>
        <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"10px 18px" }}>
          <div style={{ color:"#dc2626", fontSize:20, fontWeight:800 }}>€{Math.round(totPend)}</div>
          <div style={{ color:C.sec, fontSize:11 }}>Da incassare</div>
        </div>
      </div>

      {canEdit && !show && <div style={{ marginBottom:16 }}><Btn onClick={() => setShow(true)} color={color}>+ Nuova uscita carnet</Btn></div>}
      {canEdit && show && (
        <Card style={{ marginBottom:16 }}>
          <STitle>Nuova uscita carnet</STitle>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <Inp label="Data uscita" type="date" value={form.data} onChange={e=>setForm(p=>({...p,data:e.target.value}))} />
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <label style={{ color:C.sec, fontSize:11, fontWeight:600 }}>Azienda</label>

            <Inp label="Valore €"  type="number" value={form.valore}  onChange={e=>setForm(p=>({...p,valore:e.target.value}))} />
            <Sel label="Pagato"  value={form.pagato}  onChange={e=>setForm(p=>({...p,pagato:e.target.value}))}  opts={[{v:"si",l:"Sì"},{v:"no",l:"No"}]} />
            <Sel label="Fattura" value={form.fattura} onChange={e=>setForm(p=>({...p,fattura:e.target.value}))} opts={[{v:"si",l:"Sì"},{v:"no",l:"No"}]} />

// ─── DIARIO ───────────────────────────────────────────────────────────────────
function Diario({ ruolo, color }) {
  const [off,    setOff]    = useState(0);
  const [draft,  setDraft]  = useState("");
  const [saved,  setSaved]  = useState(true);
  const [storico,setStorico]= useState([]);
  const dk = dayOf(off);
  const sk = `${ruolo}-${dk}`;

  useEffect(() => {
    kvGet(sk).then(v => { setDraft(typeof v === "string" ? v : ""); setSaved(true); });
  }, [sk]);

  useEffect(() => {
    dbGet("kv_store", `?key=like.${ruolo}-*&order=key.desc&limit=20`).then(rows => {
      setStorico(rows.filter(r => r.key !== sk && typeof r.value === "string" && r.value.trim()));
    });
  }, [ruolo, sk]);

  const salva = async () => { await kvSet(sk, draft); setSaved(true); };

  return (
    <div style={{ display:"grid", gap:16 }}>
      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Note del giorno</STitle>
          {!saved && <span style={{ color:"#d97706", fontSize:11, fontWeight:600 }}>● non salvato</span>}
          {saved && draft && <span style={{ color:"#059669", fontSize:11, fontWeight:600 }}>✓ salvato</span>}
        </div>
        <PNav label={off===0 ? `Oggi — ${dk}` : fmtDay(dk)} onPrev={()=>setOff(o=>o-1)} onNext={()=>setOff(o=>Math.min(0,o+1))} atEnd={off===0} onReset={()=>setOff(0)} resetLabel="Oggi" />
        <textarea value={draft} onChange={e => { setDraft(e.target.value); setSaved(false); }}
          placeholder="Scrivi qui cosa è stato fatto oggi..."
          rows={8}
          style={{ background:C.input, border:`1px solid ${saved ? C.border : "#f59e0b"}`, borderRadius:8, color:C.text, padding:"10px 12px", fontSize:14, outline:"none", width:"100%", boxSizing:"border-box", resize:"vertical", lineHeight:1.7, fontFamily:"inherit" }}
        />
        <div style={{ display:"flex", justifyContent:"flex-end", marginTop:10 }}>
          <Btn onClick={salva} color={color}>{saved ? "✓ Salvato" : "Salva note"}</Btn>
        </div>
      </Card>
      {storico.length > 0 && (
        <Card>
          <STitle>Storico note</STitle>
          {storico.slice(0,8).map(row => {
            const g = row.key.replace(`${ruolo}-`, "");
            const txt = String(row.value || "");
            return (
              <div key={row.key}
                onClick={() => setOff(Math.round((new Date(g).getTime() - new Date(toDay()).getTime()) / 86400000))}
                style={{ padding:"10px 0", borderBottom:`1px solid ${C.border}`, cursor:"pointer" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                  <span style={{ color, fontWeight:600, fontSize:13 }}>{fmtDay(g)}</span>
                  <span style={{ color:C.muted, fontSize:11 }}>{txt.trim().split(/\s+/).length} parole</span>
                </div>
                <p style={{ color:C.sec, fontSize:12, margin:0, lineHeight:1.5 }}>{txt.slice(0,80)}{txt.length>80?"…":""}</p>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ─── CHECKLIST MANUALE (Contabilità) ─────────────────────────────────────────
function ChecklistManuale({ mk, canEdit, color }) {
  const [items,   setItems]   = useState([]); // [{id, testo, done}]
  const [newTxt,  setNewTxt]  = useState("");
  const storeKey = `contab-manual-${mk}`;

  useEffect(() => {
    kvGet(storeKey).then(v => {
      setItems(Array.isArray(v) ? v : []);
    });
  }, [storeKey]);

  const save = async (updated) => {
    setItems(updated);
    await kvSet(storeKey, updated);
  };

  const aggiungi = async () => {
    if (!newTxt.trim()) return;
    const updated = [...items, { id: Date.now(), testo: newTxt.trim(), done: false }];
    await save(updated);
    setNewTxt("");
  };

  const togDone = async (id) => {
    if (!canEdit) return;
    const updated = items.map(i => i.id===id ? { ...i, done: !i.done } : i);
    await save(updated);
  };

  const elimina = async (id) => {
    const updated = items.filter(i => i.id !== id);
    await save(updated);
  };

  const doneCnt = items.filter(i => i.done).length;

  return (
    <Card>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <STitle color={color}>Checklist mese</STitle>
        {items.length > 0 && <Bdg txt={`${doneCnt}/${items.length}`} color={color} />}
      </div>

      {items.length === 0 && (
        <p style={{ color:C.muted, fontSize:13, marginBottom:12 }}>Nessuna voce. Aggiungine una sotto.</p>
      )}

      {items.map(item => (
        <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
          <Chk on={item.done} onChange={() => togDone(item.id)} color={color} off={!canEdit} />
          <span style={{ flex:1, color:item.done?C.muted:C.text, textDecoration:item.done?"line-through":"none", fontSize:14 }}>
            {item.testo}
          </span>
          {canEdit && (
            <button onClick={() => elimina(item.id)}
              style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, padding:"0 4px", lineHeight:1 }}>×</button>
          )}
        </div>
      ))}

      {canEdit && (
        <div style={{ display:"flex", gap:8, marginTop:14 }}>
          <input
            value={newTxt}
            onChange={e => setNewTxt(e.target.value)}
            onKeyDown={e => e.key==="Enter" && aggiungi()}
            placeholder="Aggiungi voce checklist..."
            style={{ flex:1, background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, fontFamily:"inherit", outline:"none" }}
          />
          <Btn onClick={aggiungi} color={color}>+ Aggiungi</Btn>
        </div>
      )}
    </Card>
  );
}

// ─── RIEPILOGO CONTABILITÀ ────────────────────────────────────────────────────
function RiepilogoContab({ color }) {
  const [fuel,   setFuel]   = useState([]);
  const [carnet, setCarnet] = useState([]);
  const [loading,setLoading]= useState(true);
  const [anno,   setAnno]   = useState(new Date().getFullYear());

  useEffect(() => {
    Promise.all([
      dbGet("fuel",   "?order=data.asc"),
      dbGet("carnet", "?order=data.asc"),
    ]).then(([f, c]) => { setFuel(f); setCarnet(c); setLoading(false); });
  }, []);

  const years = [...new Set([
    ...fuel.map(e=>(e.data||"").slice(0,4)),
    ...carnet.map(e=>(e.data||"").slice(0,4)),
  ].filter(Boolean))].sort().reverse();

  if (!years.includes(String(anno)) && years.length > 0) {
    // setAnno(parseInt(years[0])); // evita loop
  }

  // Filtra per anno
  const fuelY   = fuel.filter(e=>(e.data||"").startsWith(String(anno)));
  const carnetY = carnet.filter(e=>(e.data||"").startsWith(String(anno)));

  // ── Riepilogo carburante per veicolo per mese ──
  const fuelByVeicMese = {};
  VEICOLI.forEach(v => { fuelByVeicMese[v.id] = {}; });
  fuelY.forEach(e => {
    const mese = (e.data||"").slice(5,7);
    const vId  = e.veicolo;
    if (!fuelByVeicMese[vId]) fuelByVeicMese[vId] = {};
    if (!fuelByVeicMese[vId][mese]) fuelByVeicMese[vId][mese] = { eur:0, lit:0, n:0 };
    fuelByVeicMese[vId][mese].eur += parseFloat(e.importo||0);
    fuelByVeicMese[vId][mese].lit += parseFloat(e.litri||0);
    fuelByVeicMese[vId][mese].n   += 1;
  });

  const mesiAttivi = [...new Set(fuelY.map(e=>(e.data||"").slice(5,7)).filter(Boolean))].sort();

  // ── Riepilogo carnet per mese ──
  const carnetByMese = {};
  carnetY.forEach(e => {
    const mese = (e.data||"").slice(5,7);
    if (!carnetByMese[mese]) carnetByMese[mese] = { incassato:0, pendente:0, n:0 };
    const val = parseFloat(e.valore||0);
    if (e.pagato==="si") carnetByMese[mese].incassato += val;
    else carnetByMese[mese].pendente += val;
    carnetByMese[mese].n += 1;
  });

  const mesiCarnet = [...new Set(carnetY.map(e=>(e.data||"").slice(5,7)).filter(Boolean))].sort();

  const totFuelEur = fuelY.reduce((s,e)=>s+parseFloat(e.importo||0),0);
  const totFuelLit = fuelY.reduce((s,e)=>s+parseFloat(e.litri||0),0);
  const totInc     = carnetY.filter(e=>e.pagato==="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);
  const totPend    = carnetY.filter(e=>e.pagato!=="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);

  const thStyle = { color:C.muted, fontSize:11, fontWeight:700, padding:"8px 10px", textAlign:"center", borderBottom:"2px solid "+C.border, whiteSpace:"nowrap" };
  const tdStyle = (bold) => ({ padding:"8px 10px", fontSize:13, textAlign:"center", color:bold?C.text:C.sec, fontWeight:bold?700:400, borderBottom:"1px solid "+C.border });

  if (loading) return <Spin />;

  return (
    <div style={{ display:"grid", gap:20 }}>
      {/* Anno selector */}
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <span style={{ color:C.text, fontWeight:700, fontSize:16 }}>Anno</span>
        <div style={{ display:"flex", gap:6 }}>
          {(years.length > 0 ? years : [String(anno)]).map(y => (
            <button key={y} onClick={()=>setAnno(parseInt(y))}
              style={{ padding:"5px 14px", borderRadius:20, border:"1px solid "+(anno===parseInt(y)?color:C.border),
                background:anno===parseInt(y)?color+"14":"#fff", color:anno===parseInt(y)?color:C.sec,
                cursor:"pointer", fontWeight:600, fontSize:13, fontFamily:"inherit" }}>{y}</button>
          ))}
        </div>
      </div>

      {/* KPI annuali */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:12 }}>
        {[

                <tr>
                  <th style={{ ...thStyle, textAlign:"left" }}>Veicolo</th>

                  <th style={{ ...thStyle, color:"#2563eb" }}>TOTALE</th>
                </tr>
              </thead>
              <tbody>
                {VEICOLI.map(v => {
                  const dati = fuelByVeicMese[v.id]||{};

                  if (totV === 0) return null;
                  return (
                    <tr key={v.id}>
                      <td style={{ ...tdStyle(true), textAlign:"left", color:v.color }}>{v.nome}</td>
                      {mesiAttivi.map(m => (
                        <td key={m} style={tdStyle(false)}>
                          {dati[m] ? (
                            <div>
                              <div style={{ color:"#059669", fontWeight:700 }}>€{dati[m].eur.toFixed(0)}</div>
                              <div style={{ color:C.muted, fontSize:10 }}>{dati[m].lit.toFixed(0)}L</div>
                            </div>
                          ) : <span style={{ color:"#e2e8f0" }}>—</span>}
                        </td>
                      ))}
                      <td style={{ ...tdStyle(true), color:"#2563eb" }}>€{totV.toFixed(0)}</td>
                    </tr>
                  );
                })}
                <tr style={{ background:"#f8fafc" }}>
                  <td style={{ ...tdStyle(true), textAlign:"left" }}>TOTALE MESE</td>
                  {mesiAttivi.map(m => {
                    const totM = VEICOLI.reduce((s,v)=>s+(fuelByVeicMese[v.id]?.[m]?.eur||0),0);
                    return <td key={m} style={{ ...tdStyle(true), color:"#2563eb" }}>€{totM.toFixed(0)}</td>;
                  })}
                  <td style={{ ...tdStyle(true), color:"#2563eb", fontSize:15 }}>€{totFuelEur.toFixed(0)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {/* Riepilogo carnet per mese */}
      <Card>
        <STitle color="#059669">Carnet per mese — {anno}</STitle>
        {mesiCarnet.length === 0 ? <p style={{ color:C.muted, fontSize:13 }}>Nessun dato per {anno}.</p> : (
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead>
                <tr>
                  <th style={{ ...thStyle, textAlign:"left" }}>Mese</th>
                  <th style={thStyle}>Uscite</th>
                  <th style={thStyle}>Incassato</th>
                  <th style={thStyle}>Pendente</th>
                  <th style={thStyle}>Totale</th>
                </tr>
              </thead>
              <tbody>
                {mesiCarnet.map(m => {
                  const d = carnetByMese[m];
                  return (
                    <tr key={m}>
                      <td style={{ ...tdStyle(true), textAlign:"left" }}>{MESI[parseInt(m,10)-1]}</td>
                      <td style={tdStyle(false)}>{d.n}</td>
                      <td style={{ ...tdStyle(true), color:"#059669" }}>€{d.incassato.toFixed(0)}</td>
                      <td style={{ ...tdStyle(false), color:"#dc2626" }}>€{d.pendente.toFixed(0)}</td>
                      <td style={{ ...tdStyle(true) }}>€{(d.incassato+d.pendente).toFixed(0)}</td>
                    </tr>
                  );
                })}
                <tr style={{ background:"#f8fafc" }}>
                  <td style={{ ...tdStyle(true), textAlign:"left" }}>TOTALE ANNO</td>
                  <td style={tdStyle(true)}>{carnetY.length}</td>
                  <td style={{ ...tdStyle(true), color:"#059669", fontSize:15 }}>€{totInc.toFixed(0)}</td>
                  <td style={{ ...tdStyle(true), color:"#dc2626" }}>€{totPend.toFixed(0)}</td>
                  <td style={{ ...tdStyle(true), fontSize:15 }}>€{(totInc+totPend).toFixed(0)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {/* Top aziende carnet */}
      <Card>
        <STitle color="#7c3aed">Top aziende carnet — {anno}</STitle>
        {(() => {
          const byAz = {};
          carnetY.forEach(e => {
            const az = String(e.azienda||"");
            if (!byAz[az]) byAz[az] = { incassato:0, pendente:0, n:0 };
            const val = parseFloat(e.valore||0);
            if (e.pagato==="si") byAz[az].incassato += val;
            else byAz[az].pendente += val;
            byAz[az].n += 1;
          });
          const sorted = Object.entries(byAz).sort((a,b)=>(b[1].incassato+b[1].pendente)-(a[1].incassato+a[1].pendente));
          if (sorted.length === 0) return <p style={{ color:C.muted, fontSize:13 }}>Nessun dato per {anno}.</p>;
          return (
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead>
                  <tr>
                    <th style={{ ...thStyle, textAlign:"left" }}>Azienda</th>
                    <th style={thStyle}>Uscite</th>
                    <th style={thStyle}>Incassato</th>
                    <th style={thStyle}>Pendente</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map(([az, d]) => (
                    <tr key={az}>
                      <td style={{ ...tdStyle(true), textAlign:"left" }}>{az}</td>
                      <td style={tdStyle(false)}>{d.n}</td>
                      <td style={{ ...tdStyle(true), color:"#059669" }}>€{d.incassato.toFixed(0)}</td>
                      <td style={{ ...tdStyle(false), color:"#dc2626" }}>€{d.pendente.toFixed(0)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })()}
      </Card>
    </div>
  );
}

function PageCont({ cur }) {
  const canEdit = ADMINS.includes(cur.id);

  const [tab, setTab] = useState("fuel");
  const [ch,  setCh]  = useState({});
  const [mOff,setMOff]= useState(0);
  const mk = monthOf(mOff);

  useEffect(() => { kvGet(`contab-${mk}`).then(v => { setCh(v && typeof v === "object" && !Array.isArray(v) ? v : {}); }); }, [mk]);

  const tog = async (pre, id) => {
    if (!canEdit) return;
    const k = `${pre}_${id}`;
    const n = { ...ch, [k]: !ch[k] };
    setCh(n);
    await kvSet(`contab-${mk}`, n);
  };

  return (
    <div>
      <TBar tabs={[{id:"fuel",l:"⛽ Carburante"},{id:"carnet",l:"🎫 Carnet"},{id:"cl",l:"📋 Checklist"},{id:"riepilogo",l:"📈 Riepilogo"}]} active={tab} onSelect={setTab} color={color} />
      {tab==="fuel"   && <Carburante canEdit={canEdit} />}
      {tab==="carnet" && <Carnet canEdit={canEdit} />}
      {tab==="riepilogo" && <RiepilogoContab color={color} />}
      {tab==="cl" && (
        <div style={{ display:"grid", gap:16 }}>
          <PNav label={mOff===0 ? `Questo mese — ${fmtMon(mk)}` : fmtMon(mk)} onPrev={()=>setMOff(o=>o-1)} onNext={()=>setMOff(o=>Math.min(0,o+1))} atEnd={mOff===0} onReset={()=>setMOff(0)} resetLabel="Questo" />
          <ChecklistManuale mk={mk} canEdit={canEdit} color={color} />
        </div>
      )}
    </div>
  );
}

// ─── PAGE: TURNI ─────────────────────────────────────────────────────────────
function PageTurni({ cur }) {
  const canEdit = true; // tutti possono modificare i turni
  const [off,   setOff]  = useState(1);
  const [rows,  setRows] = useState([]);
  const wk    = weekOf(off);
  const dates = wkDates(off);

  useEffect(() => {
    dbGet("turni", `?week_key=eq.${wk}`).then(d => setRows(d));
  }, [wk]);

  const getT = (uid, di) => rows.find(t => t.user_id===uid && t.day_index===di) || { inizio:"", fine:"", riposo:false };

  const upd = async (uid, di, field, value) => {
    if (!canEdit) return;
    const ex  = rows.find(t => t.user_id===uid && t.day_index===di);
    const nxt = { week_key:wk, user_id:uid, day_index:di, inizio:"", fine:"", riposo:false, ...(ex||{}), [field]:value };
    // Non passiamo id per nuovi record — lasciamo che Postgres lo generi con SERIAL
    // Per record esistenti usiamo l'id intero dal database
    if (ex && ex.id && typeof ex.id === "number") nxt.id = ex.id;
    else delete nxt.id;
    await dbUpsert("turni", nxt);
    setRows(p => [...p.filter(t => !(t.user_id===uid && t.day_index===di)), nxt]);
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20, flexWrap:"wrap" }}>
        <button onClick={() => setOff(o=>o-1)} style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:8, padding:"6px 14px", cursor:"pointer", boxShadow:C.shadow }}>‹</button>
        <span style={{ color:C.text, fontWeight:700, fontSize:15 }}>
          📅 {off===0 ? "Settimana corrente" : off===1 ? "Prossima settimana" : `Sett. del ${wk}`}
        </span>
        <button onClick={() => setOff(o=>o+1)} style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:8, padding:"6px 14px", cursor:"pointer", boxShadow:C.shadow }}>›</button>
        {off!==1 && <button onClick={() => setOff(1)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:12, fontFamily:"inherit", textDecoration:"underline" }}>Prossima ↩</button>}
      </div>
      {canEdit && (
        <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:8, padding:"10px 14px", marginBottom:16, color:"#92400e", fontSize:13 }}>
          💡 Clicca su una cella e digita orario inizio e fine. Usa <strong>⏸ riposo</strong> per giorni liberi.
        </div>
      )}
      <Card style={{ overflowX:"auto", padding:0 }}>
        <table style={{ width:"100%", borderCollapse:"collapse", minWidth:600 }}>
          <thead>
            <tr style={{ borderBottom:`2px solid ${C.border}`, background:"#f8fafc" }}>
              <th style={{ width:140, textAlign:"left", color:C.sec, fontSize:11, fontWeight:700, padding:"10px 14px", textTransform:"uppercase", letterSpacing:"0.08em" }}>Persona</th>
              {dates.map((d,i) => (
                <th key={i} style={{ color:C.sec, padding:"10px 8px", fontSize:11, textAlign:"center", fontWeight:700 }}>
                  <div style={{ textTransform:"uppercase", letterSpacing:"0.06em" }}>{GIORNI[i]}</div>
                  <div style={{ color:C.text, fontSize:13, fontWeight:600, marginTop:2 }}>{d.getDate()}/{d.getMonth()+1}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {USERS.map(u => {
              return (
                <tr key={u.id} style={{ borderTop:`1px solid ${C.border}` }}>
                  <td style={{ padding:"10px 14px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:28, height:28, borderRadius:"50%", background:u.bg, display:"flex", alignItems:"center", justifyContent:"center", color:u.color, fontWeight:800, fontSize:12, flexShrink:0 }}>
                        {u.name[0]}
                      </div>
                      <span style={{ color:C.text, fontSize:13, fontWeight:600 }}>{u.name}</span>
                    </div>
                  </td>
                  {dates.map((_, di) => {
                    const t = getT(u.id, di);
                    return (
                      <td key={di} style={{ padding:6, verticalAlign:"top" }}>
                        <div style={{ background:t.riposo?"#f1f5f9":C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px", minHeight:58 }}>
                          {!t.riposo ? (
                            <div>
                              <div style={{ display:"flex", alignItems:"center", gap:4, marginBottom:4 }}>
                                <span style={{ color:C.muted, fontSize:9, fontWeight:700, width:26, flexShrink:0 }}>INIZIO</span>
                                <input type="time" value={String(t.inizio||"")} disabled={!canEdit} onChange={e=>upd(u.id,di,"inizio",e.target.value)}
                                  style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:6, color:u.color, fontSize:11, outline:"none", width:"100%", padding:"3px 6px", cursor:canEdit?"pointer":"default", fontFamily:"inherit", fontWeight:600 }} />
                              </div>
                              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                                <span style={{ color:C.muted, fontSize:9, fontWeight:700, width:26, flexShrink:0 }}>FINE</span>
                                <input type="time" value={String(t.fine||"")} disabled={!canEdit} onChange={e=>upd(u.id,di,"fine",e.target.value)}
                                  style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:6, color:C.sec, fontSize:11, outline:"none", width:"100%", padding:"3px 6px", cursor:canEdit?"pointer":"default", fontFamily:"inherit" }} />
                              </div>
                            </div>
                          ) : (
                            <div style={{ textAlign:"center", paddingTop:10, color:C.muted, fontSize:12 }}>🌙 riposo</div>
                          )}
                          {canEdit && (
                            <button onClick={() => upd(u.id,di,"riposo",!t.riposo)}
                              style={{ background:"none", border:"none", cursor:"pointer", color:t.riposo?u.color:C.muted, fontSize:10, marginTop:4, width:"100%", textAlign:"center", fontFamily:"inherit" }}>
                              {t.riposo ? "▶ lavoro" : "⏸ riposo"}
                            </button>
                          )}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}
