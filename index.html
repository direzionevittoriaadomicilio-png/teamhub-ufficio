  useEffect(() => { kvGet(`weekly-${wk}`).then(v => { setWC(v && typeof v === "object" && !Array.isArray(v) ? v : {}); kvGet("coop_date").then(c => setCoop(typeof c === "string" ? c : "")); }); }, [wk]);
  useEffect(() => { kvGet(`monthly-${mk}`).then(v => { setMC(v && typeof v === "object" && !Array.isArray(v) ? v : {}); }); }, [mk]);

  const togD = async id => { if (!canEdit) return; const n={...daily,[id]:!daily[id]}; setDC(n); await kvSet(`daily-${dk}`, n); };
  const togW = async id => { if (!canEdit) return; const n={...weekly,[id]:!weekly[id]}; setWC(n); await kvSet(`weekly-${wk}`, n); };
  const togM = async id => { if (!canEdit) return; const n={...monthly,[id]:!monthly[id]}; setMC(n); await kvSet(`monthly-${mk}`, n); };

  return (
    <div style={{ display:"grid", gap:16 }}>
      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni giorno</STitle>
          <Bdg txt={`${CL_GG.filter(i=>daily[i.id]).length}/${CL_GG.length}`} color={color} />
        </div>
        <PNav label={dOff===0 ? `Oggi — ${dk}` : fmtDay(dk)} onPrev={()=>setDOff(o=>o-1)} onNext={()=>setDOff(o=>Math.min(0,o+1))} atEnd={dOff===0} onReset={()=>setDOff(0)} resetLabel="Oggi" />
        {CL_GG.map(item => (
          <ClRow key={item.id} item={item} checked={!!daily[item.id]} onToggle={()=>togD(item.id)} canEdit={canEdit} color={color} />
        ))}
      </Card>

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni settimana</STitle>
          <Bdg txt={`${CL_SETT.filter(i=>weekly[i.id]).length}/${CL_SETT.length}`} color={color} />
        </div>
        <PNav label={wOff===0 ? "Questa settimana" : `Sett. ${wk}`} onPrev={()=>setWOff(o=>o-1)} onNext={()=>setWOff(o=>Math.min(0,o+1))} atEnd={wOff===0} onReset={()=>setWOff(0)} resetLabel="Questa" />
        {CL_SETT.map(item => (
          <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.border}`, flexWrap:"wrap" }}>
            <Chk on={!!weekly[item.id]} onChange={()=>togW(item.id)} color={color} off={!canEdit} />
            <span style={{ color:weekly[item.id]?C.muted:C.text, textDecoration:weekly[item.id]?"line-through":"none", fontSize:14, flex:1 }}>{item.t}</span>
            {item.data && (
              <input type="date" value={coop} disabled={!canEdit} onChange={e => { setCoop(e.target.value); kvSet("coop_date", e.target.value); }}
                style={{ background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 10px", fontSize:12 }} />
            )}
          </div>
        ))}
      </Card>

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Ogni mese</STitle>
          <Bdg txt={`${CL_MESE.filter(i=>monthly[i.id]).length}/${CL_MESE.length}`} color={color} />
        </div>
        <PNav label={mOff===0 ? `Questo mese — ${fmtMon(mk)}` : fmtMon(mk)} onPrev={()=>setMOff(o=>o-1)} onNext={()=>setMOff(o=>Math.min(0,o+1))} atEnd={mOff===0} onReset={()=>setMOff(0)} resetLabel="Questo" />
        {CL_MESE.map(item => (
          <ClRow key={item.id} item={item} checked={!!monthly[item.id]} onToggle={()=>togM(item.id)} canEdit={canEdit} color={color} />
        ))}
      </Card>
    </div>
  );
}

// ─── CARBURANTE ───────────────────────────────────────────────────────────────
function Carburante({ canEdit }) {
  const [veic, setVeic] = useState("ford");
  const [selM, setSelM] = useState(monthOf(0));
  const [form, setForm] = useState({ data:toDay(), km:"", importo:"", prezzo:"", litri:"", pag:"Carta", fatt:"", note:"" });
  const [show, setShow] = useState(false);
  const [rows, setRows] = useState([]);
  const [load, setLoad] = useState(true);
  const v = VEICOLI.find(x => x.id === veic) || VEICOLI[0];

  const fetch_ = useCallback(async () => {
    setLoad(true);
    const d = await dbGet("fuel", `?veicolo=eq.${veic}&order=data.desc`);
    setRows(d);
    setLoad(false);
  }, [veic]);

  useEffect(() => { fetch_(); }, [fetch_]);

  const upd = (k, val) => setForm(p => {
    const n = { ...p, [k]: val };
    if (k === "importo" || k === "prezzo") n.litri = calcL(k==="importo"?val:p.importo, k==="prezzo"?val:p.prezzo);
    return n;
  });

  const save = async () => {
    if (!form.km || !form.importo) return;
    await dbUpsert("fuel", { id:Date.now(), data:form.data, km:form.km, importo:form.importo, prezzo:form.prezzo, litri:form.litri, pagamento:form.pag, fattorino:form.fatt, note:form.note, veicolo:veic });
    setForm({ data:toDay(), km:"", importo:"", prezzo:"", litri:"", pag:"Carta", fatt:"", note:"" });
    setShow(false);
    fetch_();
  };

  const vis = rows.filter(e => (e.data||"").startsWith(selM));
  const totE = vis.reduce((s,e) => s+parseFloat(e.importo||0), 0).toFixed(2);
  const totL = vis.reduce((s,e) => s+parseFloat(e.litri||0), 0).toFixed(2);

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {VEICOLI.map(vv => (
          <button key={vv.id} onClick={() => { setVeic(vv.id); setShow(false); }}
            style={{ padding:"7px 16px", borderRadius:20, fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit",
              border:`1px solid ${veic===vv.id ? vv.color : C.border}`,
              background: veic===vv.id ? `${vv.color}14` : "#fff",
              color: veic===vv.id ? vv.color : C.sec }}>
            {vv.nome}
          </button>
        ))}
      </div>
      <MBar tabs={mesiTabs(rows, veic)} active={selM} onSelect={setSelM} color={v.color} />

      {canEdit && !show && <div style={{ marginBottom:16 }}><Btn onClick={() => setShow(true)} color={v.color}>+ Nuovo rifornimento</Btn></div>}
      {canEdit && show && (
        <Card style={{ marginBottom:16 }}>
          <STitle>Nuovo rifornimento — {v.nome}</STitle>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <Inp label="Data" type="date" value={form.data} onChange={e=>upd("data",e.target.value)} />
            <Inp label="KM attuali" type="number" value={form.km} onChange={e=>upd("km",e.target.value)} placeholder="es. 14500" />
            <Inp label="Importo €" type="number" value={form.importo} onChange={e=>upd("importo",e.target.value)} placeholder="es. 65.00" />
            <Inp label="Prezzo €/L" type="number" value={form.prezzo} onChange={e=>upd("prezzo",e.target.value)} placeholder="es. 1.65" />
            <Inp label="Litri (auto)" value={form.litri} ro placeholder="calcolato" />
            <Sel label="Pagamento" value={form.pag} onChange={e=>upd("pag",e.target.value)} opts={PAGAMENTI} />
          </div>
          {v.fatt && <div style={{ marginBottom:12 }}><Inp label="Nome fattorino" value={form.fatt} onChange={e=>upd("fatt",e.target.value)} placeholder="Nome del fattorino" /></div>}
          <div style={{ marginBottom:14 }}><Inp label="Note" value={form.note} onChange={e=>upd("note",e.target.value)} /></div>
          <div style={{ display:"flex", gap:8 }}><Btn onClick={save} color={v.color}>Salva</Btn><Btn onClick={() => setShow(false)} ghost>Annulla</Btn></div>
        </Card>
      )}

      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14, flexWrap:"wrap", gap:10 }}>
          <STitle>{v.nome} — {fmtMon(selM)}</STitle>
          {vis.length > 0 && (
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ background:`${v.color}10`, border:`1px solid ${v.color}30`, borderRadius:8, padding:"6px 12px", textAlign:"center" }}>
                <div style={{ color:v.color, fontSize:15, fontWeight:800 }}>€{totE}</div>
                <div style={{ color:C.muted, fontSize:10 }}>spesa</div>
              </div>
              <div style={{ background:"#7c3aed10", border:"1px solid #7c3aed30", borderRadius:8, padding:"6px 12px", textAlign:"center" }}>
                <div style={{ color:"#7c3aed", fontSize:15, fontWeight:800 }}>{totL} L</div>
                <div style={{ color:C.muted, fontSize:10 }}>litri</div>
              </div>
            </div>
          )}
        </div>
        {load ? <Spin /> : vis.length === 0 ? <p style={{ color:C.muted, fontSize:13 }}>Nessun rifornimento per questo mese.</p> : (
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead>
                <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                  {["Data","KM","Importo","€/L","Litri","Pag.", ...(v.fatt?["Fattorino"]:[]), "Note"].map(h => (
                    <th key={h} style={{ color:C.sec, padding:"8px", textAlign:"left", fontWeight:700, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {vis.map(e => (
                  <tr key={e.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                    <td style={{ padding:"9px 8px", color:C.text, fontSize:13 }}>{String(e.data||"")}</td>
                    <td style={{ padding:"9px 8px", color:C.text, fontSize:13, fontWeight:600 }}>{String(e.km||"")} km</td>
                    <td style={{ padding:"9px 8px", color:"#059669", fontSize:13, fontWeight:700 }}>€{String(e.importo||"")}</td>
                    <td style={{ padding:"9px 8px", color:C.sec, fontSize:13 }}>€{String(e.prezzo||"")}</td>
                    <td style={{ padding:"9px 8px", color:"#7c3aed", fontSize:13, fontWeight:600 }}>{String(e.litri||"")} L</td>
                    <td style={{ padding:"9px 8px" }}><Bdg txt={String(e.pagamento||"")} color={v.color} /></td>
                    {v.fatt && <td style={{ padding:"9px 8px", color:"#d97706", fontSize:13, fontWeight:600 }}>{String(e.fattorino||"")}</td>}
                    <td style={{ padding:"9px 8px", color:C.muted, fontSize:13 }}>{String(e.note||"")}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{ borderTop:`2px solid ${C.border}`, background:"#f8fafc" }}>
                  <td colSpan={2} style={{ padding:"8px", color:C.sec, fontWeight:700, fontSize:12 }}>TOTALE</td>
                  <td style={{ padding:"8px", color:"#059669", fontWeight:800 }}>€{totE}</td>
                  <td /><td style={{ padding:"8px", color:"#7c3aed", fontWeight:800 }}>{totL} L</td>
                  <td colSpan={v.fatt ? 3 : 2} />
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// ─── CARNET ───────────────────────────────────────────────────────────────────
function Carnet({ canEdit }) {
  const color = "#2563eb";
  const [selM,   setSelM]   = useState(monthOf(0));
  const [rows,   setRows]   = useState([]);
  const [azList, setAzList] = useState([]);
  const [load,   setLoad]   = useState(true);
  const [show,   setShow]   = useState(false);
  const [showNA, setShowNA] = useState(false);
  const [newAz,  setNewAz]  = useState("");
  const [form,   setForm]   = useState({ data:toDay(), azienda:"", nCarnet:"1", valore:"50", pagato:"no", fattura:"no", note:"", data_pag:"" });

  const fetch_ = useCallback(async () => {
    setLoad(true);
    const [c, a] = await Promise.all([dbGet("carnet","?order=data.desc"), dbGet("aziende","?order=name.asc")]);
    setRows(c);
    const azNames = a.map(x => String(x.name || "")).filter(Boolean);
    setAzList(azNames);
    if (!form.azienda && azNames.length) setForm(p => ({ ...p, azienda: azNames[0] }));
    setLoad(false);
  }, []); // eslint-disable-line

  useEffect(() => { fetch_(); }, [fetch_]);

  const save = async () => {
    if (!form.azienda) return;
    await dbUpsert("carnet", { id:Date.now(), data:form.data, azienda:form.azienda, n_carnet:form.nCarnet, valore:form.valore, pagato:form.pagato, fattura:form.fattura, note:form.note, data_pag:form.data_pag });
    setForm(p => ({ ...p, nCarnet:"1", valore:"50", pagato:"no", fattura:"no", note:"", data_pag:"", data:toDay() }));
    setShow(false);
    fetch_();
  };

  const addAz = async () => {
    const n = newAz.trim().toUpperCase();
    if (!n) return;
    await dbUpsert("aziende", { name: n });
    setNewAz(""); setShowNA(false);
    setAzList(p => [...new Set([...p,n])].sort());
    setForm(p => ({ ...p, azienda: n }));
  };

  const vis = rows.filter(e => (e.data||"").startsWith(selM));
  const byDay = grpBy(vis, e => (e.data||"").slice(0,10));
  const days = Object.keys(byDay).sort().reverse();
  const totInc  = vis.filter(e=>e.pagato==="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);
  const totPend = vis.filter(e=>e.pagato!=="si").reduce((s,e)=>s+parseFloat(e.valore||0),0);

  return (
    <div>
      <MBar tabs={mesiTabs(rows)} active={selM} onSelect={setSelM} color={color} />
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ background:"#d1fae5", border:"1px solid #6ee7b7", borderRadius:10, padding:"10px 18px" }}>
          <div style={{ color:"#059669", fontSize:20, fontWeight:800 }}>€{Math.round(totInc)}</div>
          <div style={{ color:C.sec, fontSize:11 }}>Incassato</div>
        </div>
        <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"10px 18px" }}>
          <div style={{ color:"#dc2626", fontSize:20, fontWeight:800 }}>€{Math.round(totPend)}</div>
          <div style={{ color:C.sec, fontSize:11 }}>Da incassare</div>
        </div>
      </div>

      {canEdit && !show && <div style={{ marginBottom:16 }}><Btn onClick={() => setShow(true)} color={color}>+ Nuova uscita carnet</Btn></div>}
      {canEdit && show && (
        <Card style={{ marginBottom:16 }}>
          <STitle>Nuova uscita carnet</STitle>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <Inp label="Data uscita" type="date" value={form.data} onChange={e=>setForm(p=>({...p,data:e.target.value}))} />
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <label style={{ color:C.sec, fontSize:11, fontWeight:600 }}>Azienda</label>
                <button onClick={() => setShowNA(!showNA)} style={{ background:"none", border:"none", color, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>{showNA ? "✕ annulla" : "+ nuova"}</button>
              </div>
              {showNA ? (
                <div style={{ display:"flex", gap:6 }}>
                  <input value={newAz} onChange={e=>setNewAz(e.target.value)} placeholder="Nome azienda..." onKeyDown={e=>e.key==="Enter"&&addAz()}
                    style={{ flex:1, background:C.input, border:`1px solid ${color}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, fontFamily:"inherit", outline:"none" }} />
                  <Btn onClick={addAz} color={color} sm>+</Btn>
                </div>
              ) : (
                <select value={form.azienda} onChange={e=>setForm(p=>({...p,azienda:e.target.value}))}
                  style={{ background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, fontFamily:"inherit", outline:"none", width:"100%" }}>
                  {azList.map(az => <option key={az} value={az}>{az}</option>)}
                </select>
              )}
            </div>
            <Inp label="N° carnet" type="number" value={form.nCarnet} onChange={e=>setForm(p=>({...p,nCarnet:e.target.value}))} />
            <Inp label="Valore €"  type="number" value={form.valore}  onChange={e=>setForm(p=>({...p,valore:e.target.value}))} />
            <Sel label="Pagato"  value={form.pagato}  onChange={e=>setForm(p=>({...p,pagato:e.target.value}))}  opts={[{v:"si",l:"Sì"},{v:"no",l:"No"}]} />
            <Sel label="Fattura" value={form.fattura} onChange={e=>setForm(p=>({...p,fattura:e.target.value}))} opts={[{v:"si",l:"Sì"},{v:"no",l:"No"}]} />
            <Inp label="Data pagamento" type="date" value={form.data_pag} onChange={e=>setForm(p=>({...p,data_pag:e.target.value}))} />
            <Inp label="Note" value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} />
          </div>
          <div style={{ display:"flex", gap:8 }}><Btn onClick={save} color={color}>Salva</Btn><Btn onClick={() => setShow(false)} ghost>Annulla</Btn></div>
        </Card>
      )}

      {load ? <Spin /> : days.length === 0 ? <Card><p style={{ color:C.muted, fontSize:13 }}>Nessuna uscita per questo mese.</p></Card> : (
        days.map(day => {
          const de = byDay[day];
          const dt = de.reduce((s,e) => s+parseFloat(e.valore||0), 0);
          const [y,mo,d] = day.split("-");
          return (
            <Card key={day} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ color, fontWeight:700, fontSize:15 }}>{parseInt(d,10)} {MESI[parseInt(mo,10)-1]} {y}</div>
                <div style={{ color:C.sec, fontSize:13 }}>Totale: <span style={{ color:"#059669", fontWeight:700 }}>€{Math.round(dt)}</span></div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                      {["Azienda","N°","Valore","Pagato","Fattura","Data pag.","Note"].map(h => (
                        <th key={h} style={{ color:C.sec, padding:"7px 8px", textAlign:"left", fontWeight:700, fontSize:12 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {de.map(e => (
                      <tr key={e.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                        <td style={{ padding:"8px", color:C.text, fontWeight:600, fontSize:13 }}>{String(e.azienda||"")}</td>
                        <td style={{ padding:"8px", color:C.sec, fontSize:13, textAlign:"center" }}>{String(e.n_carnet||"")}</td>
                        <td style={{ padding:"8px", color:C.text, fontWeight:700, fontSize:13 }}>€{String(e.valore||"")}</td>
                        <td style={{ padding:"8px" }}><Bdg txt={e.pagato==="si" ? "✓ Sì" : "✗ No"} color={e.pagato==="si" ? "#059669" : "#dc2626"} /></td>
                        <td style={{ padding:"8px" }}><Bdg txt={e.fattura==="si" ? "✓ Sì" : "✗ No"} color={e.fattura==="si" ? "#059669" : "#94a3b8"} /></td>
                        <td style={{ padding:"8px", color:C.sec, fontSize:13 }}>{String(e.data_pag||"—")}</td>
                        <td style={{ padding:"8px", color:C.muted, fontSize:13 }}>{String(e.note||"")}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ─── DIARIO ───────────────────────────────────────────────────────────────────
function Diario({ ruolo, color }) {
  const [off,    setOff]    = useState(0);
  const [draft,  setDraft]  = useState("");
  const [saved,  setSaved]  = useState(true);
  const [storico,setStorico]= useState([]);
  const dk = dayOf(off);
  const sk = `${ruolo}-${dk}`;

  useEffect(() => {
    kvGet(sk).then(v => { setDraft(typeof v === "string" ? v : ""); setSaved(true); });
  }, [sk]);

  useEffect(() => {
    dbGet("kv_store", `?key=like.${ruolo}-*&order=key.desc&limit=20`).then(rows => {
      setStorico(rows.filter(r => r.key !== sk && typeof r.value === "string" && r.value.trim()));
    });
  }, [ruolo, sk]);

  const salva = async () => { await kvSet(sk, draft); setSaved(true); };

  return (
    <div style={{ display:"grid", gap:16 }}>
      <Card>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <STitle>Note del giorno</STitle>
          {!saved && <span style={{ color:"#d97706", fontSize:11, fontWeight:600 }}>● non salvato</span>}
          {saved && draft && <span style={{ color:"#059669", fontSize:11, fontWeight:600 }}>✓ salvato</span>}
        </div>
        <PNav label={off===0 ? `Oggi — ${dk}` : fmtDay(dk)} onPrev={()=>setOff(o=>o-1)} onNext={()=>setOff(o=>Math.min(0,o+1))} atEnd={off===0} onReset={()=>setOff(0)} resetLabel="Oggi" />
        <textarea value={draft} onChange={e => { setDraft(e.target.value); setSaved(false); }}
          placeholder="Scrivi qui cosa è stato fatto oggi..."
          rows={8}
          style={{ background:C.input, border:`1px solid ${saved ? C.border : "#f59e0b"}`, borderRadius:8, color:C.text, padding:"10px 12px", fontSize:14, outline:"none", width:"100%", boxSizing:"border-box", resize:"vertical", lineHeight:1.7, fontFamily:"inherit" }}
        />
        <div style={{ display:"flex", justifyContent:"flex-end", marginTop:10 }}>
          <Btn onClick={salva} color={color}>{saved ? "✓ Salvato" : "Salva note"}</Btn>
        </div>
      </Card>
      {storico.length > 0 && (
        <Card>
          <STitle>Storico note</STitle>
          {storico.slice(0,8).map(row => {
            const g = row.key.replace(`${ruolo}-`, "");
            const txt = String(row.value || "");
            return (
              <div key={row.key}
                onClick={() => setOff(Math.round((new Date(g).getTime() - new Date(toDay()).getTime()) / 86400000))}
                style={{ padding:"10px 0", borderBottom:`1px solid ${C.border}`, cursor:"pointer" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                  <span style={{ color, fontWeight:600, fontSize:13 }}>{fmtDay(g)}</span>
                  <span style={{ color:C.muted, fontSize:11 }}>{txt.trim().split(/\s+/).length} parole</span>
                </div>
                <p style={{ color:C.sec, fontSize:12, margin:0, lineHeight:1.5 }}>{txt.slice(0,80)}{txt.length>80?"…":""}</p>
              </div>
            );
          })}
        </Card>
      )}
    </div>

// ─── CHECKLIST MANUALE (Contabilità) ─────────────────────────────────────────
function ChecklistManuale({ mk, canEdit, color }) {
  const [items,   setItems]   = useState([]); // [{id, testo, done}]
  const [newTxt,  setNewTxt]  = useState("");
  const storeKey = `contab-manual-${mk}`;

  useEffect(() => {
    kvGet(storeKey).then(v => {
      setItems(Array.isArray(v) ? v : []);
    });
  }, [storeKey]);

  const save = async (updated) => {
    setItems(updated);
    await kvSet(storeKey, updated);
  };

  const aggiungi = async () => {
    if (!newTxt.trim()) return;
    const updated = [...items, { id: Date.now(), testo: newTxt.trim(), done: false }];
    await save(updated);
    setNewTxt("");
  };

  const togDone = async (id) => {
    if (!canEdit) return;
    const updated = items.map(i => i.id===id ? { ...i, done: !i.done } : i);
    await save(updated);
  };

  const elimina = async (id) => {
    const updated = items.filter(i => i.id !== id);
    await save(updated);
  };

  const doneCnt = items.filter(i => i.done).length;

  return (
    <Card>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <STitle color={color}>Checklist mese</STitle>
        {items.length > 0 && <Bdg txt={`${doneCnt}/${items.length}`} color={color} />}
      </div>

      {items.length === 0 && (
        <p style={{ color:C.muted, fontSize:13, marginBottom:12 }}>Nessuna voce. Aggiungine una sotto.</p>
      )}

      {items.map(item => (
        <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
          <Chk on={item.done} onChange={() => togDone(item.id)} color={color} off={!canEdit} />
          <span style={{ flex:1, color:item.done?C.muted:C.text, textDecoration:item.done?"line-through":"none", fontSize:14 }}>
            {item.testo}
          </span>
          {canEdit && (
            <button onClick={() => elimina(item.id)}
              style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, padding:"0 4px", lineHeight:1 }}>×</button>
          )}
        </div>
      ))}

      {canEdit && (
        <div style={{ display:"flex", gap:8, marginTop:14 }}>
          <input
            value={newTxt}
            onChange={e => setNewTxt(e.target.value)}
            onKeyDown={e => e.key==="Enter" && aggiungi()}
            placeholder="Aggiungi voce checklist..."
            style={{ flex:1, background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, fontFamily:"inherit", outline:"none" }}
          />
          <Btn onClick={aggiungi} color={color}>+ Aggiungi</Btn>
        </div>
      )}
    </Card>
  );
}

    pec:"", aggiunta_menu:""

  const load_ = async () => { setLoad(true); const d=await dbGet("contracts","?order=created_at.desc"); setContracts(d); setLoad(false); };

    const c = contracts.find(x => x.id===cid);

    const tasks_old = c.tasks && typeof c.tasks === "object" ? c.tasks : {};
    const tasks = { ...tasks_old, [tid]: !tasks_old[tid] };
    await dbUpsert("contracts", { ...c, tasks });

function TaskItem({ t, cur, color, isOpen, onToggleOpen, onToggleDone, onDelete, canCreate }) {
  const myDone   = !!(t.done && t.done[cur.id]);
  const assigned = Array.isArray(t.assegnati) ? t.assegnati : [];
  const assUsers = assigned.map(uid => getUser(uid)).filter(Boolean);
  const creator  = getUser(t.created_by);
  const isAssigned = assigned.includes(cur.id);

  return (
    <div style={{ background:C.surface, border:`1px solid ${isOpen ? color : C.border}`, borderRadius:10, marginBottom:8, overflow:"hidden", boxShadow:C.shadow }}>
      <div onClick={onToggleOpen} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", cursor:"pointer" }}>
        {isAssigned && (
          <div onClick={e => { e.stopPropagation(); onToggleDone(); }}
            style={{ width:18, height:18, borderRadius:4, flexShrink:0, border:`2px solid ${myDone?"#059669":"#cbd5e1"}`, background:myDone?"#059669":"#fff", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .15s" }}>
            {myDone && <span style={{ color:"#fff", fontSize:10, fontWeight:700 }}>✓</span>}
          </div>
        )}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ color:(myDone&&isAssigned)?C.muted:C.text, fontWeight:600, fontSize:14, textDecoration:(myDone&&isAssigned)?"line-through":"none" }}>
            {String(t.titolo||"")}
          </div>
          <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ color:C.muted, fontSize:11 }}>{String(t.created_at||"")}</span>
            {creator && <span style={{ color:creator.color, fontSize:11, fontWeight:600 }}>da {creator.name}</span>}
            {assUsers.map(u => (
              <span key={u.id} style={{ background:u.bg, color:u.color, padding:"1px 7px", borderRadius:10, fontSize:10, fontWeight:600 }}>
                {u.name}{t.done && t.done[u.id] ? " ✓" : ""}
              </span>
            ))}
          </div>
        </div>
        <span style={{ color:C.muted, fontSize:14, transition:"transform .2s", transform:isOpen?"rotate(90deg)":"rotate(0deg)" }}>›</span>
        {canCreate && (
          <button onClick={e => { e.stopPropagation(); onDelete(); }} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, padding:"0 4px", lineHeight:1 }}>×</button>
        )}
      </div>
      {isOpen && (
        <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${C.border}` }}>
          {t.dettagli ? (
            <div style={{ color:C.sec, fontSize:13, lineHeight:1.7, marginTop:10, background:C.bg, borderRadius:8, padding:"10px 14px", borderLeft:`3px solid ${color}`, whiteSpace:"pre-wrap", marginBottom:12 }}>
              {String(t.dettagli)}
            </div>
          ) : (
            <p style={{ color:C.muted, fontSize:12, fontStyle:"italic", margin:"10px 0 12px" }}>Nessun dettaglio aggiunto.</p>
          )}
          {isAssigned && (
            <button onClick={onToggleDone}
              style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 18px", borderRadius:8, border:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:700, fontSize:13, background:myDone?"#f1f5f9":"#059669", color:myDone?C.sec:"#fff" }}>
              {myDone ? "↩ Segna come da fare" : "✓ Segna come completato"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function PageTask({ cur }) {
  const canCreate = ADMINS.includes(cur.id);
  const color     = cur.color;
  const [tasks,   setTasks]   = useState([]);
  const [showForm,setShowForm]= useState(false);
  const [openId,  setOpenId]  = useState(null);
  const [filtro,  setFiltro]  = useState("miei");
  const [load,    setLoad]    = useState(true);
  const [form,    setForm]    = useState({ titolo:"", dettagli:"", assegnati:[] });

  const load_ = async () => { setLoad(true); const d=await dbGet("tasks","?order=created_at.desc"); setTasks(d); setLoad(false); };
  useEffect(() => { load_(); }, []);

  const toggleAss = uid => setForm(p => ({
    ...p,
    assegnati: p.assegnati.includes(uid) ? p.assegnati.filter(x=>x!==uid) : [...p.assegnati, uid],
  }));

  const crea = async () => {
    if (!form.titolo.trim() || form.assegnati.length===0) return;
    await dbUpsert("tasks", { id:Date.now(), titolo:form.titolo.trim(), dettagli:form.dettagli.trim(), assegnati:form.assegnati, created_by:cur.id, created_at:toDay(), done:{} });
    setForm({ titolo:"", dettagli:"", assegnati:[] });
    setShowForm(false);
    load_();
  };

  const toggleDone = async t => {
    const done_old = t.done && typeof t.done === "object" ? t.done : {};
    const done = { ...done_old, [cur.id]: !done_old[cur.id] };
    await dbUpsert("tasks", { ...t, done });
    setTasks(p => p.map(x => x.id===t.id ? { ...x, done } : x));
  };

  const del_ = async id => { await dbDelete("tasks", `id=eq.${id}`); setTasks(p=>p.filter(t=>t.id!==id)); if(openId===id)setOpenId(null); };

  const isDone = t => {
    const ass = Array.isArray(t.assegnati) ? t.assegnati : [];
    const dn  = t.done && typeof t.done === "object" ? t.done : {};
    if (canCreate && filtro==="tutti") return ass.every(u => dn[u]);
    return !!dn[cur.id];
  };

  const vis      = canCreate && filtro==="tutti" ? tasks : tasks.filter(t => (Array.isArray(t.assegnati)?t.assegnati:[]).includes(cur.id));
  const pending  = vis.filter(t => !isDone(t));
  const completed= vis.filter(t => isDone(t));

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:10 }}>
        {canCreate && (
          <div style={{ display:"flex", gap:6 }}>
            {[{id:"miei",l:"I miei"},{id:"tutti",l:"Tutti"}].map(f => (
              <button key={f.id} onClick={() => setFiltro(f.id)}
                style={{ padding:"6px 14px", borderRadius:20, fontFamily:"inherit", fontWeight:600, fontSize:13, cursor:"pointer",
                  border:`1px solid ${filtro===f.id ? color : C.border}`,
                  background: filtro===f.id ? `${color}14` : "#fff",
                  color: filtro===f.id ? color : C.sec }}>
                {f.l}
              </button>
            ))}
          </div>
        )}
        {canCreate && <Btn onClick={() => setShowForm(!showForm)} color={color}>{showForm ? "✕ Annulla" : "+ Nuovo task"}</Btn>}
      </div>

      {canCreate && showForm && (
        <Card style={{ marginBottom:20 }}>
          <STitle>Nuovo task</STitle>
          <div style={{ display:"grid", gap:12, marginBottom:14 }}>
            <Inp label="Titolo" value={form.titolo} onChange={e=>setForm(p=>({...p,titolo:e.target.value}))} placeholder="Es. Aggiornare listino prezzi" />
            <div>
              <label style={{ color:C.sec, fontSize:11, fontWeight:600, display:"block", marginBottom:4 }}>Dettagli (visibili al clic)</label>
              <textarea value={form.dettagli} onChange={e=>setForm(p=>({...p,dettagli:e.target.value}))} placeholder="Descrivi cosa deve fare..." rows={3}
                style={{ background:C.input, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box", resize:"vertical", lineHeight:1.6, fontFamily:"inherit" }} />
            </div>
            <div>
              <label style={{ color:C.sec, fontSize:11, fontWeight:600, display:"block", marginBottom:8 }}>Assegna a</label>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {USERS.map(u => {
                  const sel_ = form.assegnati.includes(u.id);
                  return (
                    <button key={u.id} onClick={() => toggleAss(u.id)}
                      style={{ display:"flex", alignItems:"center", gap:7, padding:"8px 14px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", transition:"all .15s",
                        border:`2px solid ${sel_ ? u.color : C.border}`,
                        background: sel_ ? u.bg : "#fff" }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:u.color }} />
                      <span style={{ color: sel_ ? u.color : C.sec, fontWeight:600, fontSize:13 }}>{u.name}</span>
                      {sel_ && <span style={{ color:u.color, fontSize:12 }}>✓</span>}
                    </button>
                  );
                })}
              </div>
              {form.assegnati.length===0 && <p style={{ color:"#dc2626", fontSize:11, margin:"6px 0 0" }}>Seleziona almeno una persona.</p>}
            </div>
          </div>
          <Btn onClick={crea} color={color}>Crea task</Btn>
        </Card>
      )}

      {load ? <Spin /> : (
        <div>
          {pending.length===0 && completed.length===0 && (
            <Card><p style={{ color:C.muted, fontSize:13, margin:0 }}>{canCreate ? "Nessun task creato." : "Nessun task assegnato a te."}</p></Card>
          )}
          {pending.length > 0 && (
            <div style={{ marginBottom:20 }}>
              <div style={{ color:C.sec, fontSize:12, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:10 }}>Da fare — {pending.length}</div>
              {pending.map(t => (
                <TaskItem key={t.id} t={t} cur={cur} color={color} isOpen={openId===t.id} onToggleOpen={() => setOpenId(openId===t.id?null:t.id)} onToggleDone={() => toggleDone(t)} onDelete={() => del_(t.id)} canCreate={canCreate} />
              ))}
            </div>
          )}
          {completed.length > 0 && (
            <div>
              <div style={{ color:C.muted, fontSize:12, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:10 }}>Completati — {completed.length}</div>
              {completed.map(t => (
                <TaskItem key={t.id} t={t} cur={cur} color={color} isOpen={openId===t.id} onToggleOpen={() => setOpenId(openId===t.id?null:t.id)} onToggleDone={() => toggleDone(t)} onDelete={() => del_(t.id)} canCreate={canCreate} />
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const PAGE_LABELS = { home:"Dashboard", app:"Gestione App", social:"Social Media", cont:"Contabilità", turni:"Pianificazione Turni", contr:"Nuovi Contratti", task:"Task & Assegnazioni" };

function Shell({ uid, setUid }) {
  const [page, setPage] = useState("home");
  const [mob,  setMob]  = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);

  const cur = getUser(uid);

  useEffect(() => {
    const check = () => setMob(window.innerWidth < 768);
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);

  // Auto-refresh ogni 2 minuti
  useEffect(() => {
    const interval = setInterval(() => {
      setRefreshKey(k => k + 1);
    }, 120000);
    return () => clearInterval(interval);
  }, []);

  const visNav = NAV.filter(n => n.roles.includes("all") || n.roles.includes(uid));

  const PageContent = () => {
    if (page==="home")  return <ErrBound name="Home"><PageHome cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="app")   return <ErrBound name="App"><PageApp cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="social")return <ErrBound name="Social"><PageSocial cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="cont")  return <ErrBound name="Contabilità"><PageCont cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="turni") return <ErrBound name="Turni"><PageTurni cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="contr") return <ErrBound name="Contratti"><PageContratti cur={cur} key={refreshKey} /></ErrBound>;
    if (page==="task")  return <ErrBound name="Task"><PageTask cur={cur} key={refreshKey} /></ErrBound>;
    return null;
  };

  if (mob) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column" }}>
        <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 16px", height:52, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:50, flexShrink:0 }}>
          <span style={{ fontFamily:"'Syne',sans-serif", fontSize:19, fontWeight:800, color:C.text, letterSpacing:"-0.03em" }}>Team<span style={{ color:"#6366f1" }}>Hub</span></span>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:"50%", background:cur.bg, display:"flex", alignItems:"center", justifyContent:"center", color:cur.color, fontWeight:800, fontSize:14 }}>{cur.name[0]}</div>
            <button onClick={() => setUid(null)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:20, padding:4, lineHeight:1 }}>↩</button>
          </div>
        </div>
        <div style={{ flex:1, overflow:"auto", padding:"16px 12px", paddingBottom:80 }}>
          <PageContent />
        </div>
        <div style={{ position:"fixed", bottom:0, left:0, right:0, background:C.surface, borderTop:`1px solid ${C.border}`, display:"flex", zIndex:50, boxShadow:"0 -2px 10px rgba(0,0,0,0.06)" }}>
          {visNav.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)}
              style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"8px 4px 10px", border:"none", background:"transparent", cursor:"pointer", fontFamily:"inherit", gap:3,
                borderTop:`2px solid ${page===n.id ? cur.color : "transparent"}`,
                color: page===n.id ? cur.color : C.muted }}>
              <span style={{ fontSize:18, lineHeight:1 }}>{n.icon}</span>
              <span style={{ fontSize:9, fontWeight: page===n.id ? 700 : 500, letterSpacing:"0.02em" }}>{n.label}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex" }}>
      <div style={{ width:220, background:C.surface, borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", position:"sticky", top:0, height:"100vh", flexShrink:0 }}>
        <div style={{ padding:"20px 20px 16px", borderBottom:`1px solid ${C.border}` }}>
          <span style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:C.text, letterSpacing:"-0.03em" }}>Team<span style={{ color:"#6366f1" }}>Hub</span></span>
        </div>
        <nav style={{ flex:1, padding:"12px 10px", display:"flex", flexDirection:"column", gap:2 }}>
          {visNav.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)}
              style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"9px 12px", border:"none", borderRadius:8, cursor:"pointer", textAlign:"left", fontFamily:"inherit", fontSize:14, fontWeight: page===n.id ? 700 : 500, transition:"all .1s",
                background: page===n.id ? `${cur.color}14` : "transparent",
                color: page===n.id ? cur.color : C.sec,
                borderLeft: `3px solid ${page===n.id ? cur.color : "transparent"}` }}>
              <span style={{ fontSize:16 }}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding:"14px 16px", borderTop:`1px solid ${C.border}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:34, height:34, borderRadius:"50%", background:cur.bg, display:"flex", alignItems:"center", justifyContent:"center", color:cur.color, fontWeight:800, fontSize:14, flexShrink:0 }}>{cur.name[0]}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color:C.text, fontSize:13, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{cur.name}</div>
              <div style={{ color:C.muted, fontSize:11 }}>{cur.full}</div>
            </div>
            <button onClick={() => setUid(null)} title="Esci" style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, padding:2 }}>↩</button>
          </div>
        </div>
      </div>
      <div style={{ flex:1, overflow:"auto" }}>
        <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 28px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:40 }}>
          <h1 style={{ color:C.text, margin:0, fontSize:17, fontWeight:700, fontFamily:"'Syne',sans-serif" }}>{PAGE_LABELS[page]}</h1>
          <div style={{ color:C.muted, fontSize:12 }}>{new Date().toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"})}</div>
        </div>
        <div style={{ padding:28, maxWidth:1100, margin:"0 auto" }}>
          <PageContent />
        </div>
      </div>
    </div>
  );
}

const PINS = { contabilita: "2024", admin: "2024" };

function App() {
  const [uid,    setUid]    = useState(null);
  const [pinFor, setPinFor] = useState(null); // id utente che richiede PIN
  const [pin,    setPin]    = useState("");
  const [pinErr, setPinErr] = useState(false);

  useEffect(() => {
    const lk = document.createElement("link");
    lk.href = "https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap";
    lk.rel  = "stylesheet";
    document.head.appendChild(lk);
    const st = document.createElement("style");
    st.textContent = "@keyframes spin{to{transform:rotate(360deg)}} *{box-sizing:border-box}";
    document.head.appendChild(st);
    Object.assign(document.body.style, { margin:0, background:C.bg, fontFamily:"'DM Sans',sans-serif", color:C.text });
  }, []);

  const handleSelect = (uid) => {
    if (PINS[uid]) {
      setPinFor(uid);
      setPin("");
      setPinErr(false);
    } else {
      setUid(uid);
    }
  };

  const handlePin = () => {
    if (pin === PINS[pinFor]) {
      setUid(pinFor);
      setPinFor(null);
      setPin("");
      setPinErr(false);
    } else {
      setPinErr(true);
      setPin("");
    }
  };

  if (!uid) {
    const u = pinFor ? getUser(pinFor) : null;
    return (
      <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#f0f4ff,#faf5ff,#f0fdf4)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
        <div style={{ width:"100%", maxWidth:380 }}>
          <div style={{ textAlign:"center", marginBottom:36 }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif", color:C.text, fontSize:34, fontWeight:800, margin:"0 0 8px", letterSpacing:"-0.03em" }}>
              Team<span style={{ color:"#6366f1" }}>Hub</span>
            </h1>
            <p style={{ color:C.sec, fontSize:14, margin:0 }}>Seleziona il tuo profilo</p>
          </div>

          {/* Lista profili */}
          <div style={{ display:"grid", gap:10 }}>
            {USERS.map(u => (
              <button key={u.id} onClick={() => handleSelect(u.id)}
                style={{ display:"flex", alignItems:"center", gap:14, background: pinFor===u.id ? `${u.color}10` : "#fff", border:`1px solid ${pinFor===u.id ? u.color : C.border}`, borderRadius:14, padding:"14px 20px", cursor:"pointer", textAlign:"left", fontFamily:"inherit", boxShadow:C.shadow, width:"100%" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor=u.color; e.currentTarget.style.boxShadow=`0 4px 14px ${u.color}25`; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor= pinFor===u.id ? u.color : C.border; e.currentTarget.style.boxShadow=C.shadow; }}>
                <div style={{ width:44, height:44, borderRadius:"50%", background:u.bg, display:"flex", alignItems:"center", justifyContent:"center", color:u.color, fontWeight:800, fontSize:18, flexShrink:0 }}>
                  {u.name[0]}
                </div>
                <div>
                  <div style={{ color:C.text, fontWeight:700, fontSize:15 }}>{u.name}</div>
                  <div style={{ color:C.sec, fontSize:12, marginTop:2 }}>{u.full}</div>
                </div>
                <div style={{ marginLeft:"auto", color: PINS[u.id] ? u.color : C.muted, fontSize:18 }}>
                  {PINS[u.id] ? "🔒" : "›"}
                </div>
              </button>
            ))}
          </div>

          {/* Box PIN */}
          {pinFor && u && (
            <div style={{ marginTop:20, background:"#fff", border:`2px solid ${u.color}`, borderRadius:14, padding:20, boxShadow:C.shadow }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:u.bg, display:"flex", alignItems:"center", justifyContent:"center", color:u.color, fontWeight:800, fontSize:16, flexShrink:0 }}>{u.name[0]}</div>
                <div>
                  <div style={{ color:C.text, fontWeight:700, fontSize:14 }}>{u.name}</div>
                  <div style={{ color:C.sec, fontSize:12 }}>Inserisci il PIN per accedere</div>
                </div>
              </div>

              {/* Puntini PIN */}
              <div style={{ display:"flex", justifyContent:"center", gap:12, marginBottom:16 }}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{ width:14, height:14, borderRadius:"50%", background: pin.length > i ? u.color : "#e2e8f0", transition:"background .15s" }} />
                ))}
              </div>

              {pinErr && <div style={{ color:"#dc2626", fontSize:13, textAlign:"center", marginBottom:12, fontWeight:600 }}>PIN non corretto. Riprova.</div>}

              {/* Tastierino numerico */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((n,i) => (
                  <button key={i} onClick={() => {
                    if (n === "") return;
                    if (n === "⌫") { setPin(p => p.slice(0,-1)); setPinErr(false); }
                    else if (pin.length < 4) {
                      const np = pin + n;
                      setPin(np);
                      if (np.length === 4) {
                        setTimeout(() => {
                          if (np === PINS[pinFor]) { setUid(pinFor); setPinFor(null); setPin(""); setPinErr(false); }
                          else { setPinErr(true); setPin(""); }
                        }, 150);
                      }
                    }
                  }}
                    style={{ padding:"14px 0", borderRadius:10, border:`1px solid ${C.border}`, background: n==="" ? "transparent" : C.hover, color:C.text, fontWeight:700, fontSize:18, cursor: n==="" ? "default" : "pointer", fontFamily:"inherit", boxShadow: n!=="" ? C.shadow : "none" }}>
                    {n}
                  </button>
                ))}
              </div>

              <button onClick={() => { setPinFor(null); setPin(""); setPinErr(false); }}
                style={{ marginTop:14, width:"100%", background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13, fontFamily:"inherit" }}>
                ← Torna ai profili
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return <Shell uid={uid} setUid={setUid} />;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
